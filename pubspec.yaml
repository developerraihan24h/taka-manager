name: takamanager
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  path_provider: ^2.1.5
  path: ^1.9.1
  sqflite: ^2.4.2
  webview_flutter: ^4.13.1
  share_plus: ^12.0.1
  provider: ^6.1.5
  fl_chart: ^0.70.2
  intl: ^0.20.2
  image_picker: ^1.2.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher Icon Configuration
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/takamanager.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
  fonts:
    - family: bold
      fonts:
       - asset: assets/fonts/ArchivoBlack-Regular.ttf
